<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ShopEasy</title>
<style>
/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}
body{
height:100vh;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
background:#f5f5f5;
padding:20px;
}
/* LOGIN BOX */
.auth-box{
width:100%;
max-width:400px;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
/* TITLE */
.auth-box h1{
text-align:center;
font-size:30px;
color:#222;
margin-bottom:5px;
}
.auth-box h2{
text-align:center;
font-size:22px;
color:#666;
margin-bottom:25px;
}
/* INPUT */
.input-box{
position:relative;
margin-bottom:18px;
}
.input-box span{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:16px;
}
.input-box input{
width:100%;
padding:12px 12px 12px 40px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}
.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff9900;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
.login-btn:hover{
background:#e68a00;
}
/* OPTIONS */
.options{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:13px;
}
.options a{
color:#ff9900;
text-decoration:none;
}
/* REGISTER */
.register{
text-align:center;
margin-top:18px;
font-size:14px;
color:#555;
}
.register a{
color:#ff9900;
font-weight:bold;
text-decoration:none;
}
/* REMEMBER */
.remember{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#555;
}
/* PROFESSIONAL PIPELINE BUTTON */
.journey-container {
width: 100%;
max-width: 400px;
margin-top: 20px;
}
.journey-btn {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
padding: 16px 24px;
background: #111827;
color: #fff;
font-size: 16px;
font-weight: bold;
text-decoration: none;
border-radius: 10px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
transition: 0.3s;
}
.journey-btn:hover {
background: #1f2937;
transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="auth-box">
<h1>ShopEasy</h1>
<h2>Login to your account</h2>

<form id="loginForm">
<div class="input-box">
<span>📧</span>
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<span>🔒</span>
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label class="remember">
<input type="checkbox"> Remember Me
</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit" class="login-btn" style="margin-top:20px;">Login</button>
</form>

<div class="register">
Don't have an account? <a href="register.html">Register</a>
</div>
</div>

<div class="journey-container">
    <a href="home.html" class="journey-btn">
        <span>Skip Directly to Home Storefront</span>
        <span>➔</span>
    </a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    alert("Logged in successfully!");
    window.location.href = "home.html";
});
</script>
</body>
</html>
