<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | ShopEasy</title>
<style>
/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}
body{
min-height:100vh;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
background:#f5f5f5;   /* CLEAN WHITE GREY THEME */
padding:20px;
}
/* AUTH BOX */
.auth-box{
width:100%;
max-width:420px;
background:#ffffff;
padding:40px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
/* TITLE */
.auth-box h1{
text-align:center;
font-size:32px;
margin-bottom:8px;
color:#222;
}
.auth-box p{
text-align:center;
color:#666;
margin-bottom:25px;
font-size:14px;
}
/* INPUT BOX */
.input-box{
position:relative;
margin-bottom:18px;
}
.input-box span{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
}
.input-box input{
width:100%;
padding:12px 15px 12px 42px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
font-size:16px;
}
.toggle-password {
position: absolute;
right: 15px;
top: 50%;
transform: translateY(-50%);
cursor: pointer;
}
.terms {
margin: 15px 0;
display: flex;
align-items: center;
gap: 8px;
font-size: 14px;
color: #555;
}
.auth-btn{
width:100%;
padding:14px;
background:#111827;
color:white;
border:none;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}
.auth-btn:hover{
background:#1f2937;
}
.login-link{
text-align:center;
margin-top:20px;
font-size:14px;
color:#666;
}
.login-link a{
color:#ff9900;
text-decoration:none;
font-weight:bold;
}
/* PROFESSIONAL PIPELINE BUTTON */
.journey-container {
width: 100%;
max-width: 420px;
margin-top: 20px;
}
.journey-btn {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
padding: 16px 24px;
background: #ff9900;
color: #111;
font-size: 16px;
font-weight: bold;
text-decoration: none;
border-radius: 10px;
box-shadow: 0 4px 15px rgba(255, 153, 0, 0.2);
transition: 0.3s;
}
.journey-btn:hover {
background: #e68a00;
transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="auth-box">
<h1>Create Account</h1>
<p>Join ShopEasy and start shopping</p>

<form id="registerForm">
<div class="input-box">
<span>👤</span>
<input type="text" placeholder="Full Name" required>
</div>

<div class="input-box">
<span>📧</span>
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<span>🔒</span>
<input type="password" id="password" placeholder="Password" required>
<div class="toggle-password" onclick="togglePassword()">👁️</div>
</div>

<div class="input-box">
<span>🔑</span>
<input type="password" placeholder="Confirm Password" required>
</div>

<div class="terms">
<input type="checkbox" required>
<label>I agree to Terms & Conditions</label>
</div>

<button type="submit" class="auth-btn">Create Account</button>
</form>

<div class="login-link">
Already have account? <a href="login.html">Login</a>
</div>
</div>

<div class="journey-container">
    <a href="login.html" class="journey-btn">
        <span>Proceed to Secure Login</span>
        <span>➔</span>
    </a>
</div>

<script>
function togglePassword(){
    let p = document.getElementById("password");
    if(p.type === "password") { p.type = "text"; } else { p.type = "password"; }
}
document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    alert("Account created successfully!");
    window.location.href = "login.html";
});
</script>
</body>
</html>
